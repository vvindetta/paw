name: Rust Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libpam0g-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paw-linux-release-build
          path: |
            target/release/libpaw.so
            target/release/libpaw_password.so
            target/release/libpaw_fingerprint.so
            target/release/password_hasher
          if-no-files-found: error
